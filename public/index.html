<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employee Directory</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
    }

    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #1a1a2e;
      color: white;
      padding: 14px 20px;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 500;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 999;
      opacity: 0;
      transform: translateY(12px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast-icon {
      width: 20px;
      height: 20px;
      background: #4caf50;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 0.75rem;
    }

    header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: white;
      padding: 24px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
    }

    header svg {
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    header p {
      font-size: 0.85rem;
      opacity: 0.7;
      margin-top: 2px;
    }

    .container {
      max-width: 1200px;
      margin: 32px auto;
      padding: 0 24px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: white;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .stat-card .label {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #888;
      font-weight: 600;
    }

    .stat-card .value {
      font-size: 2rem;
      font-weight: 700;
      color: #0f3460;
      line-height: 1;
    }

    .toolbar {
      background: white;
      border-radius: 12px;
      padding: 18px 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
    }

    .search-wrap svg {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      pointer-events: none;
    }

    .search-wrap input {
      width: 100%;
      padding: 10px 12px 10px 38px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-wrap input:focus {
      border-color: #0f3460;
    }

    select {
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.9rem;
      background: white;
      outline: none;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    select:focus {
      border-color: #0f3460;
    }

    #resultCount {
      font-size: 0.85rem;
      color: #888;
      margin-left: auto;
      white-space: nowrap;
    }

    .table-wrap {
      background: white;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      min-height: 150px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead th {
      background: #f8f9fb;
      padding: 14px 16px;
      text-align: left;
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      border-bottom: 1.5px solid #eee;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }

    thead th:hover {
      background: #eef0f4;
    }

    thead th .sort-icon {
      margin-left: 4px;
      opacity: 0.4;
      font-size: 0.7rem;
    }

    thead th.active .sort-icon {
      opacity: 1;
      color: #0f3460;
    }

    tbody tr {
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.12s;
    }

    tbody tr:last-child {
      border-bottom: none;
    }

    tbody tr:hover {
      background: #f7f8fc;
    }

    td {
      padding: 14px 16px;
      font-size: 0.9rem;
      vertical-align: middle;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
      color: white;
      flex-shrink: 0;
    }

    .name-cell {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .name-cell .name {
      font-weight: 600;
    }

    .name-cell .email {
      font-size: 0.8rem;
      color: #888;
    }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
    }

    .empty-state {
      text-align: center;
      padding: 130px 20px;
      color: #aaa;
    }

    .empty-state svg {
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .empty-state p {
      height: 80;
      font-size: 1rem;
    }

    #loadingRow td {
      text-align: center;
      padding: 40px;
      color: #aaa;
      font-size: 0.9rem;
    }

    .btn-add {
      padding: 10px 18px;
      background: #0f3460;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .btn-add:hover {
      background: #16213e;
    }

    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-backdrop.open {
      display: flex;
    }

    .modal {
      background: white;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.2);
      position: relative;
    }

    .modal h2 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 24px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    .form-group label {
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #666;
    }

    .form-group input,
    .form-group select {
      padding: 9px 12px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: #0f3460;
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 24px;
    }

    .btn-cancel {
      padding: 10px 18px;
      background: #f0f2f5;
      color: #555;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-cancel:hover {
      background: #e0e0e0;
    }

    .btn-submit {
      padding: 10px 20px;
      background: #0f3460;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-submit:hover {
      background: #16213e;
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .form-error {
      color: #c62828;
      font-size: 0.82rem;
      margin-top: 10px;
      display: none;
    }

    .required-star {
      color: #c62828;
      margin-left: 2px;
    }

    .field-error {
      color: #c62828;
      font-size: 0.78rem;
      margin-top: 3px;
      display: none;
    }

    .form-group input.invalid,
    .form-group select.invalid {
      border-color: #c62828;
    }

    .pagination {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      margin-top: 18px;
      padding: 0 16px 16px;
    }

    .pagination button {
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid #d7dbe3;
      background: #fff;
      color: #1a1a2e;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .pagination button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .pagination-info {
      min-width: 104px;
      text-align: center;
      color: #666;
      font-size: 0.82rem;
    }

    .chart-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
      padding: 18px 20px;
      margin-bottom: 20px;
      margin-top: 20px;
    }

    .chart-title {
      font-size: 0.82rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      font-weight: 800;
      margin-bottom: 14px;
      margin-top: 14px;
    }

    .chart-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 18px;
      align-items: center;
    }

    #salaryPieChart {
      width: 240px;
      height: 240px;
      max-width: 100%;
    }

    .chart-legend {
      display: grid;
      gap: 8px;

    }

    .legend-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 0.88rem;
      color: #1a1a2e;
      font-weight: 600;
      padding: 8px 0;
      border-bottom: 1px solid #eceff3;
    }

    .legend-item:last-child {
      border-bottom: none;
    }

    .legend-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    @media (max-width: 700px) {
      .container {
        padding: 0 12px;
      }

      .chart-layout {
        grid-template-columns: 1fr;
        justify-items: center;
      }

      .chart-legend {
        width: 100%;
      }

      td:nth-child(4),
      th:nth-child(4),
      td:nth-child(6),
      th:nth-child(6) {
        display: none;
      }
    }
  </style>
</head>

<body>

  <div class="toast" id="toast">
    <div class="toast-icon">✓</div>
    <span id="toastMsg"></span>
  </div>

  <header>
    <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
      <circle cx="18" cy="18" r="18" fill="rgba(255,255,255,0.1)" />
      <circle cx="18" cy="14" r="5" fill="white" opacity="0.9" />
      <path d="M8 28c0-5.523 4.477-10 10-10s10 4.477 10 10" stroke="white" stroke-width="2" stroke-linecap="round"
        opacity="0.9" />
    </svg>
    <div>
      <h1>Employee Directory</h1>
      <p>Manage and view all company employees</p>
    </div>
  </header>

  <div class="container">

    <div class="stats-row" id="statsRow">
      <div class="stat-card">
        <span class="label">Total Employees</span>
        <span class="value" id="statTotal">—</span>
      </div>
      <div class="stat-card">
        <span class="label">Departments</span>
        <span class="value" id="statDepts">—</span>
      </div>
      <div class="stat-card">
        <span class="label">Avg. Salary</span>
        <span class="value" id="statSalary">—</span>
      </div>
    </div>



    <div class="toolbar">
      <div class="search-wrap">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8" />
          <path d="M21 21l-4.35-4.35" />
        </svg>
        <input type="text" id="searchInput" placeholder="Search by name, position, or email…" />
      </div>
      <select id="deptFilter">
        <option value="all">All Departments</option>
      </select>
      <span id="resultCount"></span>
      <button class="btn-add" id="openModalBtn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
          <line x1="12" y1="5" x2="12" y2="19" />
          <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
        Add Employee
      </button>
    </div>



    <div class="modal-backdrop" id="modalBackdrop">
      <div class="modal">
        <h2>Add New Employee</h2>
        <form id="addEmployeeForm">
          <div class="form-grid">
            <div class="form-group full">
              <label for="f-name">Full Name <span class="required-star">*</span></label>
              <input id="f-name" name="name" type="text" placeholder="e.g. Jane Doe" />
              <span class="field-error" id="err-name"></span>
            </div>
            <div class="form-group full">
              <label for="f-phone">Phone Number</label>
              <input id="f-phone" name="phone" type="tel" placeholder="e.g. +1 604 888 8888" />
              <span class="field-error" id="err-phone"></span>
            </div>
            <div class="form-group full">
              <label for="f-email">Email <span class="required-star">*</span></label>
              <input id="f-email" name="email" type="text" placeholder="e.g. jane@example.com" />
              <span class="field-error" id="err-email"></span>
            </div>
            <div class="form-group">
              <label for="f-dept">Department <span class="required-star">*</span></label>
              <select id="f-dept" name="department">
                <option value="">Select…</option>
              </select>
              <span class="field-error" id="err-department"></span>
            </div>
            <div class="form-group">
              <label for="f-position">Position <span class="required-star">*</span></label>
              <input id="f-position" name="position" type="text" placeholder="e.g. Engineer" />
              <span class="field-error" id="err-position"></span>
            </div>
            <div class="form-group">
              <label for="f-hire-date">Hire Date <span class="required-star">*</span></label>
              <input id="f-hire-date" name="hire_date" type="date" />
              <span class="field-error" id="err-hire_date"></span>
            </div>
            <div class="form-group">
              <label for="f-salary">Salary ($) <span class="required-star">*</span></label>
              <input id="f-salary" name="salary" type="number" min="0" placeholder="e.g. 75000" />
              <span class="field-error" id="err-salary"></span>
            </div>
          </div>
          <p class="form-error" id="formError"></p>
          <div class="form-actions">
            <button type="button" class="btn-cancel" id="closeModalBtn">Cancel</button>
            <button type="submit" class="btn-submit" id="submitBtn">Add Employee</button>
          </div>
        </form>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-col="id">ID <span class="sort-icon">▲</span></th>
            <th data-col="name">Employee <span class="sort-icon">▲</span></th>
            <th data-col="department">Department <span class="sort-icon">▲</span></th>
            <th data-col="position">Position <span class="sort-icon">▲</span></th>
            <th data-col="hire_date">Hire Date <span class="sort-icon">▲</span></th>
            <th data-col="salary">Salary <span class="sort-icon">▲</span></th>
            <th style="text-align:center;width:80px;">Edit</th>
            <th style="text-align:center;width:80px;">Delete</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr id="loadingRow">
            <td colspan="8">Loading employees…</td>
          </tr>
        </tbody>
      </table>
      <div class="pagination" id="paginationControls">
        <button id="prevPageBtn" type="button">Prev</button>
        <span class="pagination-info" id="pageInfo">Page 0 of 0</span>
        <button id="nextPageBtn" type="button">Next</button>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-title">Salary Share by Department</div>
      <div class="chart-layout">
        <canvas id="salaryPieChart" width="240" height="240" aria-label="Department salary share pie chart"></canvas>
        <div class="chart-legend" id="salaryChartLegend"></div>
      </div>
    </div>
  </div>

  <script>
    const DEPT_COLORS = {
      'Engineering': ['#e8f4fd', '#1565c0'],
      'Marketing': ['#fce4ec', '#c2185b'],
      'HR': ['#e8f5e9', '#2e7d32'],
      'Finance': ['#fff8e1', '#f57f17'],
      'Design': ['#f3e5f5', '#6a1b9a'],
    };

    const AVATAR_COLORS = ['#e63946', '#2196f3', '#4caf50', '#ff9800', '#9c27b0', '#00bcd4', '#795548', '#607d8b', '#f06292', '#26a69a'];

    let sortCol = 'id';
    let sortOrder = 'asc';
    let allEmployees = [];
    let currentPage = 1;
    const rowsPerPage = 5;
    let totalPages = 1;
    let totalRows = 0;

    function getDepartmentColor(department, index = 0) {
      // Match chart colors to department badges.
      return (DEPT_COLORS[department] && DEPT_COLORS[department][1])
        || ['#0f3460', '#2e7d32', '#f57f17', '#c2185b', '#6a1b9a', '#00897b', '#5d4037', '#1976d2'][index % 8];
    }

    function avatarColor(name) {
      let h = 0;
      for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
      return AVATAR_COLORS[h % AVATAR_COLORS.length];
    }

    function initials(name) {
      return name.split(' ').map(p => p[0]).join('').slice(0, 2).toUpperCase();
    }

    function deptBadge(dept) {
      const [bg, text] = DEPT_COLORS[dept] || ['#e0e0e0', '#555'];
      return `<span class="badge" style="background:${bg};color:${text}">${dept}</span>`;
    }

    function formatDate(d) {
      const [y, m, day] = d.split('-');
      return `${day}/${m}/${y}`;
    }

    function formatSalary(n) {
      return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 0 });
    }

    function drawPieChart(data) {
      const canvas = document.getElementById('salaryPieChart');
      const legend = document.getElementById('salaryChartLegend');
      const ctx = canvas.getContext('2d');
      const cssSize = 240;
      const dpr = window.devicePixelRatio || 1;

      canvas.width = cssSize * dpr;
      canvas.height = cssSize * dpr;
      canvas.style.width = `${cssSize}px`;
      canvas.style.height = `${cssSize}px`;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.clearRect(0, 0, cssSize, cssSize);

      const total = data.reduce((sum, item) => sum + Number(item.salary || 0), 0);
      if (!total) {
        const iconX = cssSize / 2;
        const iconY = cssSize / 2 - 18;

        // Draw a subtle magnifier icon to mirror the table empty-state pattern.
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.25)';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(iconX, iconY, 16, 0, Math.PI * 2);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(iconX + 12, iconY + 12);
        ctx.lineTo(iconX + 20, iconY + 20);
        ctx.stroke();

        ctx.fillStyle = '#aaa';
        ctx.font = '16px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('No salary data', cssSize / 2, cssSize / 2 + 34);
        legend.innerHTML = '';
        return;
      }

      const centerX = cssSize / 2;
      const centerY = cssSize / 2;
      const radius = 92;
      let startAngle = -Math.PI / 2;

      data.forEach((item, index) => {
        const value = Number(item.salary || 0);
        const sliceAngle = (value / total) * Math.PI * 2;
        const color = getDepartmentColor(item.department, index);

        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.arc(centerX, centerY, radius, startAngle, startAngle + sliceAngle);
        ctx.closePath();
        ctx.fillStyle = color;
        ctx.fill();

        startAngle += sliceAngle;
      });

      // Donut hole for readability.
      ctx.beginPath();
      ctx.arc(centerX, centerY, 52, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();

      legend.innerHTML = data.map((item, index) => {
        const value = Number(item.salary || 0);
        const color = getDepartmentColor(item.department, index);
        const calculatedPercentage = ((value / total) * 100).toFixed(1);
        return `
          <div class="legend-item">
            <div class="legend-left">
              <span class="legend-dot" style="background:${color}"></span>
              <span>${item.department}</span>
            </div>
            <span> ${formatSalary(value)}(${calculatedPercentage}%) </span>
      
          </div>
        `;
      }).join('');
    }

    async function loadSalaryChart() {
      try {
        const res = await fetch('/api/salary-by-department');
        const data = await res.json();
        drawPieChart(Array.isArray(data) ? data : []);
      } catch {
        drawPieChart([]);
      }
    }

    function renderTable(employees) {
      const tbody = document.getElementById('tableBody');
      document.getElementById('resultCount').textContent = `${totalRows} result${totalRows !== 1 ? 's' : ''}`;

      if (employees.length === 0) {
        tbody.innerHTML = `<tr><td colspan="8">
        <div class="empty-state">
          <svg width="48" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          <p>No employees match your search.</p>
        </div>
      </td></tr>`;
        updatePaginationControls();
        return;
      }


      const employeeRows = employees.map(emp => `
      <tr>
        <td style="color:#aaa;font-size:0.82rem">#${emp.id}</td>
        <td>
          <div class="name-cell">
            <div class="avatar" style="background:${avatarColor(emp.name)}">${initials(emp.name)}</div>
            <div>
              <div class="name">${emp.name}</div>
              <div class="email">${emp.email}</div>
            </div>
          </div>
        </td>
        <td>${deptBadge(emp.department)}</td>
        <td>${emp.position}</td>
        <td>${formatDate(emp.hire_date)}</td>
        <td style="font-weight:600">${formatSalary(emp.salary)}</td>
        <td style="text-align:center;">
          <button onclick="openEditEmployee(${emp.id})" style="padding:5px 14px;background:#e8f0fe;color:#1565c0;border:none;border-radius:6px;font-size:0.82rem;font-weight:600;cursor:pointer;">Edit</button>
        </td>
        <td style="text-align:center;">
          <button onclick="deleteEmployee(${emp.id})" style="padding:5px 14px;background:#fdecea;color:#c62828;border:none;border-radius:6px;font-size:0.82rem;font-weight:600;cursor:pointer;">Delete</button>
        </td>
      </tr>
    `).join('');

      const blankRow = `
      <tr aria-hidden="true">
        <td style="height:65px;">&nbsp;</td>
        <td style="height:65px;">&nbsp;</td>
        <td style="height:65px;">&nbsp;</td>
        <td style="height:65px;">&nbsp;</td>
        <td style="height:65px;">&nbsp;</td>
        <td style="height:65px;">&nbsp;</td>
        <td style="height:65px;">&nbsp;</td>
        <td style="height:65px;">&nbsp;</td>
      </tr>
    `;
      const blankCount = Math.max(0, rowsPerPage - employees.length);
      tbody.innerHTML = employeeRows + blankRow.repeat(blankCount);
    }

    function updatePaginationControls() {
      const controls = document.getElementById('paginationControls');
      const prevBtn = document.getElementById('prevPageBtn');
      const nextBtn = document.getElementById('nextPageBtn');
      const pageInfo = document.getElementById('pageInfo');
      const searchValue = (document.getElementById('searchInput').value || '').trim();
      const selectedDept = document.getElementById('deptFilter').value;
      const hasActiveFilter = Boolean(searchValue) || selectedDept !== 'all';

      const shouldShowPagination = totalRows > rowsPerPage || (hasActiveFilter && totalRows > 0);
      controls.style.display = shouldShowPagination ? 'flex' : 'none';
      pageInfo.textContent = `Page ${currentPage} of ${Math.max(1, totalPages)}`;
      prevBtn.disabled = currentPage <= 1;
      nextBtn.disabled = currentPage >= totalPages;
    }

    function updateSortHeaders() {
      document.querySelectorAll('thead th').forEach(th => {
        const col = th.dataset.col;
        th.classList.toggle('active', col === sortCol);
        const icon = th.querySelector('.sort-icon');
        if (icon) {
          if (col === sortCol) {
            icon.textContent = sortOrder === 'asc' ? '▲' : '▼';
          } else {
            icon.textContent = '▲';
          }
        }
      });
    }

    async function loadDepartments() {
      const res = await fetch('/api/departments');
      const depts = await res.json();
      const sel = document.getElementById('deptFilter');

      // Keep only the default "All Departments" option before repopulating.
      while (sel.options.length > 1) sel.remove(1);

      depts.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d; opt.textContent = d;
        sel.appendChild(opt);
      });
      document.getElementById('statDepts').textContent = depts.length;
    }

    async function loadEmployees() {
      const search = document.getElementById('searchInput').value;
      const department = document.getElementById('deptFilter').value;
      const params = new URLSearchParams({
        search,
        department,
        sort: sortCol,
        order: sortOrder,
        page: String(currentPage),
        limit: String(rowsPerPage),
      });
      const res = await fetch(`/api/employees?${params}`);
      allEmployees = await res.json();

      totalRows = Number(res.headers.get('X-Total-Count') || allEmployees.length);
      totalPages = Number(res.headers.get('X-Total-Pages') || 1);

      if (currentPage > totalPages) {
        currentPage = totalPages;
        return loadEmployees();
      }

      renderTable(allEmployees);
      updatePaginationControls();

      if (department === 'all' && !search) {
        document.getElementById('statTotal').textContent = totalRows;
        const avg = allEmployees.reduce((s, e) => s + e.salary, 0) / (allEmployees.length || 1);
        document.getElementById('statSalary').textContent = '$' + Math.round(avg / 1000) + 'k';
      }
    }

    document.querySelectorAll('thead th[data-col]').forEach(th => {
      th.addEventListener('click', () => {
        const col = th.dataset.col;
        if (sortCol === col) {
          sortOrder = sortOrder === 'asc' ? 'desc' : 'asc';
        } else {
          sortCol = col;
          sortOrder = 'asc';
        }
        currentPage = 1;
        updateSortHeaders();
        loadEmployees();
      });
    });

    let debounceTimer;
    document.getElementById('searchInput').addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => {
        currentPage = 1;
        loadEmployees();
      }, 250);
    });

    document.getElementById('deptFilter').addEventListener('change', () => {
      currentPage = 1;
      loadEmployees();
    });

    document.getElementById('prevPageBtn').addEventListener('click', () => {
      if (currentPage > 1) {
        currentPage -= 1;
        loadEmployees();
      }
    });

    document.getElementById('nextPageBtn').addEventListener('click', () => {
      if (currentPage < totalPages) {
        currentPage += 1;
        loadEmployees();
      }
    });

    updateSortHeaders();
    loadDepartments();
    loadEmployees();
    loadSalaryChart();

    let editingEmployeeMethod = null;

    async function openEditEmployee(id) {
      const res = await fetch(`/api/employees/${id}`);
      const emp = await res.json();
      const fDept = document.getElementById('f-dept');
      fDept.innerHTML = '<option value="">Select…</option>';
      document.querySelectorAll('#deptFilter option').forEach(opt => {
        if (opt.value && opt.value !== 'all') {
          const o = document.createElement('option');
          o.value = opt.value; o.textContent = opt.textContent;
          fDept.appendChild(o);
        }
      });
      editingEmployeeMethod = id;
      document.getElementById('f-name').value = emp.name || '';
      document.getElementById('f-phone').value = emp.phone || '';
      document.getElementById('f-email').value = emp.email || '';
      document.getElementById('f-dept').value = emp.department || '';
      document.getElementById('f-position').value = emp.position || '';
      document.getElementById('f-hire-date').value = emp.hire_date || '';
      document.getElementById('f-salary').value = emp.salary || '';

      document.querySelector('.modal h2').textContent = 'Edit Employee';
      document.getElementById('submitBtn').textContent = 'Save Changes';
      document.getElementById('formError').style.display = 'none';
      document.getElementById('addEmployeeForm').querySelectorAll('.field-error').forEach(el => { el.textContent = ''; el.style.display = 'none'; });
      document.getElementById('addEmployeeForm').querySelectorAll('.invalid').forEach(el => el.classList.remove('invalid'));
      document.getElementById('modalBackdrop').classList.add('open');
    }
    window.openEditEmployee = openEditEmployee;
    // ---- Delete Employee Modal ----
    async function deleteEmployee(id) {
      const employee = allEmployees.find(e => Number(e.id) === Number(id));
      const name = employee?.name || '';
      if (!confirm(`Are you sure you want to delete user called "${name}" with (ID: ${id})? This cannot be undone.`)) return;
      try {
        const res = await fetch(`/api/employees/${id}`, { method: 'DELETE' });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || 'Failed to delete employee');
        }
        loadEmployees();
        loadDepartments();
        loadSalaryChart();
        showToast(`Deleted "${name}" (ID: ${id}) successfully.`);
      } catch (err) {
        alert(err.message);
      }
    }
    window.deleteEmployee = deleteEmployee;

    // ---- Add Employee Modal ----
    const modal = document.getElementById('modalBackdrop');
    const form = document.getElementById('addEmployeeForm');
    const formError = document.getElementById('formError');
    const submitBtn = document.getElementById('submitBtn');

    document.getElementById('openModalBtn').addEventListener('click', () => {
      // Populate department dropdown from existing options
      const fDept = document.getElementById('f-dept');
      fDept.innerHTML = '<option value="">Select…</option>';
      document.querySelectorAll('#deptFilter option').forEach(opt => {
        if (opt.value && opt.value !== 'all') {
          const o = document.createElement('option');
          o.value = opt.value; o.textContent = opt.textContent;
          fDept.appendChild(o);
        }
      });
      editingEmployeeMethod = null;
      document.querySelector('.modal h2').textContent = 'Add New Employee';
      submitBtn.textContent = 'Add Employee';
      form.reset();
      formError.style.display = 'none';
      form.querySelectorAll('.field-error').forEach(el => { el.textContent = ''; el.style.display = 'none'; });
      form.querySelectorAll('.invalid').forEach(el => el.classList.remove('invalid'));
      modal.classList.add('open');
    });

    function closeModal() { modal.classList.remove('open'); }
    document.getElementById('closeModalBtn').addEventListener('click', closeModal);
    modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });

    // Clear all field errors and return false if any field is invalid
    function validateForm(body) {
      const fields = ['name', 'phone', 'email', 'department', 'position', 'hire_date', 'salary'];
      fields.forEach(f => {
        const el = document.getElementById('f-' + f.replace('_', '-')) || document.getElementById('f-dept');
        const err = document.getElementById('err-' + f);
        if (el) el.classList.remove('invalid');
        if (err) { err.textContent = ''; err.style.display = 'none'; }
      });

      const errors = {};

      // Name: required, 2–80 chars
      if (!body.name || body.name.trim().length < 2) {
        errors.name = 'Name must be at least 2 characters.';
      } else if (!/^[\p{L}\s\-'.]+$/u.test(body.name.trim())) {
        errors.name = 'Name can only contain letters, spaces, hyphens, or apostrophes.';
      } else if (body.name.trim().length > 80) {
        errors.name = 'Name must be 80 characters or fewer.';
      }

      if (body.phone && body.phone.trim()) {
        if (!/^[+\d][\d\s\-().]{5,18}$/.test(body.phone.trim()) || body.phone.replace(/\D/g, '').length < 7) {
          errors.phone = 'Enter a valid phone number (e.g. +1 604 888 8888).';
        }
      }

      // Email: required, valid format
      if (!body.email || !body.email.trim()) {
        errors.email = 'Email is required.';
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(body.email.trim())) {
        errors.email = 'Enter a valid email address.';
      }

      // Department: required selection
      if (!body.department) {
        errors.department = 'Please select a department.';
      }

      // Position: required, 2–80 chars
      if (!body.position || body.position.trim().length < 2) {
        errors.position = 'Position must be at least 2 characters.';
      } else if (body.position.trim().length > 80) {
        errors.position = 'Position must be 80 characters or fewer.';
      }

      // Hire date: required, not in the future
      if (!body.hire_date) {
        errors.hire_date = 'Hire date is required.';
      } else {
        const today = new Date(); today.setHours(0, 0, 0, 0);
        const chosen = new Date(body.hire_date);
        if (isNaN(chosen)) {
          errors.hire_date = 'Enter a valid date.';
        } else if (chosen > today) {
          errors.hire_date = 'Hire date cannot be in the future.';
        }
      }

      // Salary: required, positive integer
      const sal = Number(body.salary);
      if (body.salary === '' || body.salary === undefined) {
        errors.salary = 'Salary is required.';
      } else if (isNaN(sal) || sal <= 0) {
        errors.salary = 'Salary must be a positive number.';
      } else if (!Number.isInteger(sal)) {
        errors.salary = 'Salary must be a whole number.';
      }

      const fieldIds = { name: 'f-name', phone: 'f-phone', email: 'f-email', department: 'f-dept', position: 'f-position', hire_date: 'f-hire-date', salary: 'f-salary' };
      Object.entries(errors).forEach(([field, msg]) => {
        const input = document.getElementById(fieldIds[field]);
        const errEl = document.getElementById('err-' + field);
        if (input) input.classList.add('invalid');
        if (errEl) { errEl.textContent = msg; errEl.style.display = 'block'; }
      });

      return Object.keys(errors).length === 0;
    }

    form.addEventListener('submit', async e => {
      e.preventDefault();
      formError.style.display = 'none';

      const body = Object.fromEntries(new FormData(form));
      if (!validateForm(body)) return;

      submitBtn.disabled = true;
      body.salary = Number(body.salary);

      try {
        const method = editingEmployeeMethod ? 'PUT' : 'POST';
        const url = editingEmployeeMethod ? `/api/employees/${editingEmployeeMethod}` : '/api/employees';
        const res = await fetch(url, {
          method,
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || (editingEmployeeMethod ? 'Failed to update employee' : 'Failed to add employee'));
        }
        closeModal();
        const wasEditing = Boolean(editingEmployeeMethod);
        await loadDepartments();
        if (wasEditing) {
          document.getElementById('deptFilter').value = 'all';
          currentPage = 1;
        }
        await loadEmployees();
        await loadSalaryChart();

        showToast(wasEditing ? 'Employee updated successfully!' : 'Employee added successfully!');
      } catch (err) {
        formError.textContent = err.message;
        formError.style.display = 'block';
      } finally {
        submitBtn.disabled = false;
      }
    });

    let toastTimer;
    function showToast(msg) {
      const toast = document.getElementById('toast');
      document.getElementById('toastMsg').textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
    }
  </script>

</body>
